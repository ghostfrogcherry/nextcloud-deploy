services:
  app:
    ports:
      - "127.0.0.1:${NEXTCLOUD_PORT:-8080}:80"

  caddy:
    image: caddy:2
    container_name: nextcloud-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks:
      - nextcloud
